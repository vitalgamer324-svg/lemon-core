<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | Lemon Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        :root { --accent: #b7db2c; --bg: #020202; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins'; margin:0; }
        .login-card { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(183,219,44,0.1); width: 380px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 14px; background: #000; border: 1px solid #222; border-radius: 10px; color: white; margin-bottom: 15px; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(183,219,44,0.1); }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; font-size: 16px; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(183,219,44,0.3); }
        .toggle-btn { background: none; border: none; color: #888; font-size: 13px; cursor: pointer; margin-top: 15px; text-decoration: underline; }
        #statusMsg { font-size: 12px; margin-bottom: 15px; display: none; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,0,0,0.2); background: rgba(255,0,0,0.05); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="font-family:'Space Grotesk'; color:var(--accent); margin-bottom: 5px; font-size: 32px;">LEMON CORE</h2>
        <p id="subText" style="font-size:12px; color:#666; margin-bottom:25px; letter-spacing: 1px;">SECURE ACCESS HUB</p>
        <div id="statusMsg"></div>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-main" onclick="handleAuth()" id="authBtn">LOGIN</button>
        <button class="toggle-btn" onclick="toggleMode()" id="modeBtn">Don't have an account? Register</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE",
            authDomain: "lemoncorehub.firebaseapp.com",
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com",
            projectId: "lemoncorehub",
            storageBucket: "lemoncorehub.firebasestorage.app",
            messagingSenderId: "525738244860",
            appId: "1:525738244860:web:80f017ad81ddb675d83579"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let isLoginMode = true;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authBtn').innerText = isLoginMode ? "LOGIN" : "REGISTER";
            document.getElementById('modeBtn').innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
            document.getElementById('statusMsg').style.display = "none";
        }

        function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            const status = document.getElementById('statusMsg');

            if(!email || !pass) {
                status.style.display="block";
                status.innerText="Please fill all fields!";
                return;
            }

            // ADMIN BYPASS
            if(email === "lemonadmin77@gmail.com" && pass === "lemon2008") {
                localStorage.setItem("role", "admin");
                window.location.href = "admin.html"; 
                return; 
            }

            if(isLoginMode) {
                auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    localStorage.setItem("role", "member");
                    window.location.href = "index.html";
                })
                .catch(err => {
                    status.style.display="block";
                    status.innerText = "Error: " + err.message;
                });
            } else {
                auth.createUserWithEmailAndPassword(email, pass)
                .then(() => {
                    localStorage.setItem("role", "member");
                    window.location.href = "index.html";
                })
                .catch(err => {
                    status.style.display="block";
                    status.innerText = "Error: " + err.message;
                });
            }
        }
    </script>
</body>
</html>
