<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lemon Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(183, 219, 44, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            width: 380px;
            text-align: center;
        }

        .login-card h2 {
            color: #b7db2c;
            font-size: 28px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .login-card p { color: #888; margin-bottom: 25px; font-size: 14px; }

        .input-group { margin-bottom: 20px; text-align: left; }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #b7db2c; background: rgba(255, 255, 255, 0.12); }

        .auth-buttons { display: flex; gap: 10px; }

        .login-btn {
            flex: 1;
            padding: 14px;
            background: #b7db2c;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(183, 219, 44, 0.4);
        }

        .register-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--accent);
            border-radius: 8px;
            color: #b7db2c;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .error-msg {
            color: #ff4757;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }

    </style>
</head>
<body>

    <div class="login-card">
        <h2>Lemon Core</h2>
        <p>Login or Register for Gaming Portal</p>

        <div class="input-group">
            <input type="text" id="userInput" placeholder="Username (Unique)">
        </div>
        <div class="input-group">
            <input type="password" id="passInput" placeholder="Password (4+ chars)">
        </div>

        <div class="auth-buttons">
            <button class="login-btn" id="loginBtn" onclick="handleAuth('login')">Login</button>
            <button class="register-btn" onclick="handleAuth('register')">Register</button>
        </div>
        
        <p id="errorBox" class="error-msg">Error message...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <script>
        // --- MAHIN: APNAR REAL CONFIG EIKHANE BOSHABEN ---
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "lemoncorehub.firebaseapp.com",
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com",
            projectId: "lemoncorehub",
            storageBucket: "lemoncorehub.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth(); 

        async function handleAuth(type) {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const btn = document.getElementById('loginBtn');

            if(u.length < 3 || p.length < 4) {
                showError("Username min 3, Password min 4 chars den!");
                return;
            }

            // --- ADMIN OVERRIDE (Master Logic charai) ---
            if(u.toLowerCase() === "mahin" && p === "lemon77") {
                saveAndRedirect("Mahin", "Admin");
                return;
            }

            btn.disabled = true;

            // Simple Password Check to show "Account not found" fix
            db.ref('users/' + u).once('value', (snapshot) => {
                const userData = snapshot.val();

                if(type === 'login') {
                    // --- LOGIN LOGIC ---
                    if(userData && userData.password === p) {
                        if(userData.status === "Banned") {
                            showError("BANNED: Admin support contact koren.");
                            resetBtn();
                        } else {
                            saveAndRedirect(u, userData.role || "Member");
                        }
                    } else {
                        showError("Username ba Password hoy nai!");
                        resetBtn();
                    }
                } else {
                    // --- REGISTER LOGIC (Automatic fix for "Account Not Found") ---
                    if(userData) {
                        showError("Username already taken! Choose another.");
                        resetBtn();
                    } else {
                        btn.innerText = "Creating Account...";
                        // Automatic Registration with Firebase Database
                        db.ref('users/' + u).set({
                            password: p,
                            role: "Member",
                            status: "Active",
                            joined: new Date().toLocaleDateString()
                        }).then(() => {
                            alert("Account created for "+u+"! Now click 'Login'.");
                            resetBtn();
                        });
                    }
                }
            });
        }

        function saveAndRedirect(user, role) {
            localStorage.setItem("currentUser", user);
            localStorage.setItem("role", role);
            db.ref('users/' + user).update({ lastLogin: new Date().toLocaleString() });
            window.location.href = (role === "Admin") ? "admin.html" : "index.html";
        }

        function showError(msg) {
            const err = document.getElementById('errorBox');
            err.innerText = msg;
            err.style.display = "block";
            setTimeout(() => { err.style.display = "none"; }, 3000);
        }

        function resetBtn() {
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Login";
            btn.disabled = false;
        }
    </script>
</body>
</html>
