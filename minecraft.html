<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minecraft S2 | Premium Server List</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --accent: #b7db2c; --bg: #030303; --card: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--bg); color: white; font-family: 'Poppins'; margin: 0; padding-bottom: 50px; }
        
        /* Navigation */
        nav { padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 99; }
        .logo { font-family: 'Space Grotesk'; font-size: 26px; color: var(--accent); text-decoration: none; font-weight: 700; letter-spacing: 1px; }

        /* Announcement Section */
        #announcementBar { display: none; background: #000; border: 2px solid var(--accent); margin: 20px 8% 0; padding: 20px; border-radius: 15px; text-align: left; }
        .ann-tag { background: var(--accent); color: #000; padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }

        /* Page Layout */
        .hub-hero { padding: 80px 8% 40px; text-align: center; }
        .hub-hero h1 { font-family: 'Space Grotesk'; font-size: clamp(40px, 8vw, 80px); margin: 0; font-weight: 900; text-transform: uppercase; line-height: 1; }
        .hub-hero span { color: var(--accent); }

        .btn-premium { margin-top: 30px; padding: 15px 40px; background: var(--accent); color: black; border: none; border-radius: 50px; font-weight: 900; font-family: 'Space Grotesk'; cursor: pointer; transition: 0.4s; text-transform: uppercase; font-size: 14px; }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(183,219,44,0.4); }

        /* --- SERVER LIST --- */
        .list-container { padding: 0 8%; margin-top: 60px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        /* Professional Premium Card */
        .premium-card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; position: relative; overflow: hidden; }
        .premium-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-glow { position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--accent); filter: blur(100px); opacity: 0.1; pointer-events: none; }
        
        /* Rank System shoho */
        .rank-badge { background: #000; color: var(--accent); font-family: 'Space Grotesk'; font-size: 24px; font-weight: 900; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; position: absolute; top: 15px; left: 15px; border: 2px solid var(--accent); box-shadow: 0 0 10px rgba(183,219,44,0.3); }

        .card-header { display: flex; align-items: center; gap: 20px; margin-top: 10px; }
        .server-logo { height: 60px; width: 60px; border-radius: 12px; border: 1px solid #333; }
        .server-banner { height: 120px; width: 100%; border-radius: 15px; object-fit: cover; border: 1px solid #222; margin-top: 10px; }
        
        .server-title { font-family: 'Space Grotesk'; font-size: 22px; color: #fff; margin: 0; }
        .server-ip { background: #111; padding: 10px 15px; border-radius: 8px; font-family: monospace; font-size: 14px; color: var(--accent); cursor: pointer; width: 100%; text-align: center; border: 1px solid #333; }
        .server-ip:hover { border-color: var(--accent); }

        .copy-info { font-size: 11px; color: #555; text-transform: uppercase; text-align: center; margin-top: -15px; }

        /* --- SUBMISSION FORM --- */
        .submission-section { padding: 80px 8%; background: #050505; margin-top: 100px; border-top: 1px solid var(--border); text-align: center; }
        .submission-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 50px; text-align: left; }
        input, textarea, select { width: 100%; background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 12px; color: #fff; outline: none; font-size: 14px; margin-bottom: 20px; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">LEMON CORE S2</a>
    </nav>

    <div id="announcementBar">
        <span class="ann-tag">S2 UPDATE</span>
        <h3 id="displayTitle" style="font-family: 'Space Grotesk'; margin-bottom: 5px;">Headline</h3>
        <p id="displayMsg" style="margin: 0; color: #aaa; font-size: 14px;"></p>
    </div>

    <section class="hub-hero">
        <h1>THE <span>LEMON</span> HUB</h1>
        <p style="color: #666;">Season 2 Premium Server Directory.</p>
        <button class="btn-premium" onclick="scrollToSubmission()">➕ Submit Your Server</button>
    </section>

    <div class="list-container">
        <h2 style="font-family: 'Space Grotesk'; text-align: center; margin-bottom: 60px; text-transform: uppercase;">Professional Listings</h2>
        <div id="serverList" class="grid">
            </div>
    </div>

    <section id="submissionForm" class="submission-section">
        <h2 style="font-family: 'Space Grotesk'; font-size: 40px; text-transform: uppercase;">Add Your <span>Server</span></h2>
        <p style="color: #888; max-width: 600px; margin: 10px auto 0;">Type your server details below. Submit data carefully. Banners must be 800x200 or larger.</p>
        
        <div class="submission-grid">
            <div>
                <input type="text" id="sName" placeholder="Server Name (e.g. Complex Gaming)">
                <input type="text" id="sIP" placeholder="Server IP (e.g. play.mc-complex.com)">
                <textarea id="sDesc" rows="5" placeholder="Short description for the card..."></textarea>
            </div>
            <div>
                <input type="url" id="sBanner" placeholder="URL of your Server Banner">
                <input type="url" id="sLogo" placeholder="URL of your Server Logo">
                <input type="text" id="sVersion" placeholder="Version (e.g. 1.21.x)">
                <button class="btn-premium" style="width: 100%;" onclick="publishServer()">Publish Professional Listing</button>
            </div>
        </div>
    </section>

    <script>
        // Firebase Setup
        const firebaseConfig = {
            apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE",
            authDomain: "lemoncorehub.firebaseapp.com",
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com",
            projectId: "lemoncorehub",
            appId: "1:525738244860:web:80f017ad81ddb675d83579"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Submit Data (Publish)
        function publishServer() {
            const data = {
                name: document.getElementById('sName').value,
                ip: document.getElementById('sIP').value,
                desc: document.getElementById('sDesc').value,
                banner: document.getElementById('sBanner').value || "https://i.imgur.com/your-default-banner.jpg",
                logo: document.getElementById('sLogo').value || "https://i.imgur.com/your-default-logo.jpg",
                version: document.getElementById('sVersion').value || "1.21.x",
                timestamp: Date.now()
            };

            if(!data.name || !data.ip || !data.banner) return alert("Fill data first!");

            db.ref('mc_servers').push().set(data).then(() => {
                alert("SUCCESS: Professional Listing Published!");
                location.reload(); // Refresh to update rank
            });
        }

        // 2. Real-time Sync List & Rank
        let serverRank = 0;
        db.ref('mc_servers').on('value', snap => {
            const listArea = document.getElementById('serverList');
            listArea.innerHTML = ''; // Clear old list
            serverRank = 0;

            snap.forEach((childSnap) => {
                const data = childSnap.val();
                serverRank++;
                
                const card = `
                    <div class="premium-card">
                        <div class="card-glow"></div>
                        <div class="rank-badge">${serverRank}</div>
                        
                        <div class="card-header">
                            <img src="${data.logo}" class="server-logo">
                            <div>
                                <h3 class="server-title">${data.name}</h3>
                                <span style="font-size: 11px; color: var(--accent); font-weight: 800; font-family: monospace;">${data.version}</span>
                            </div>
                        </div>

                        <img src="${data.banner}" class="server-banner">
                        <p style="color: #aaa; font-size: 13px; line-height: 1.6; margin: 0 0 10px;">${data.desc}</p>
                        
                        <div class="server-ip" onclick="copyText('${data.ip}')">${data.ip}</div>
                        <p class="copy-info">Click IP to copy</p>
                    </div>
                `;
                listArea.innerHTML += card;
            });
        });

        // 3. UI Functions
        function scrollToSubmission() { document.getElementById('submissionForm').scrollIntoView({ behavior: "smooth" }); }
        function copyText(txt) { navigator.clipboard.writeText(txt); alert("IP Copied!"); }

        // Announcement Logic (Matching Index)
        db.ref('announcement').on('value', snap => {
            const data = snap.val();
            const bar = document.getElementById('announcementBar');
            if (data && data.active) {
                document.getElementById('displayTitle').innerText = data.title || "UPDATE";
                document.getElementById('displayMsg').innerText = data.message || "";
                
                const titleEl = document.getElementById('displayTitle');
                if (data.anim && data.anim !== 'none') titleEl.classList.add(data.anim);
                
                bar.style.display = "block";
            } else {
                bar.style.display = "none";
            }
        });
    </script>
</body>
</html>
