<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Lemon Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .login-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(183, 219, 44, 0.2); width: 380px; text-align: center; }
        .login-card h2 { color: #b7db2c; font-size: 28px; margin-bottom: 10px; text-transform: uppercase; }
        input { width: 100%; padding: 12px 15px; background: rgba(255, 255, 255, 0.07); border: 1px solid #333; border-radius: 8px; color: white; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #b7db2c; }
        .login-btn { width: 100%; padding: 14px; background: #b7db2c; border: none; border-radius: 8px; color: black; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .error-msg { color: #ff4757; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Join Lemon Core</h2>
        <p style="color:#888; margin-bottom:20px;">Create your account</p>

        <input type="text" id="regUser" placeholder="Choose Username">
        <input type="password" id="regPass" placeholder="Set Password">

        <button class="login-btn" onclick="handleRegister()">Register Now</button>
        <p id="regError" class="error-msg"></p>

        <div style="margin-top:20px; font-size:13px;">
            Already have an account? <a href="login.html" style="color:#b7db2c; text-decoration:none;">Login</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Apnar Real API Key eikhane boshan
            authDomain: "lemoncorehub.firebaseapp.com",
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com",
            projectId: "lemoncorehub",
            storageBucket: "lemoncorehub.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function handleRegister() {
            const u = document.getElementById('regUser').value.trim();
            const p = document.getElementById('regPass').value.trim();
            const err = document.getElementById('regError');

            if(u.length < 3 || p.length < 4) {
                err.innerText = "Username/Pass ektu boro den!";
                err.style.display = "block";
                return;
            }

            // Check if user exists
            db.ref('users/' + u).once('value', (snapshot) => {
                if(snapshot.exists()) {
                    err.innerText = "Username already taken!";
                    err.style.display = "block";
                } else {
                    // Save to Firebase
                    db.ref('users/' + u).set({
                        password: p,
                        role: "Member",
                        status: "Active",
                        joined: new Date().toLocaleDateString()
                    }).then(() => {
                        alert("Account created! Now login.");
                        window.location.href = "login.html";
                    });
                }
            });
        }
    </script>
</body>
</html>
