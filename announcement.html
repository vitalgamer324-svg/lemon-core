<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Core | S2 Admin Broadcast</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --accent: #b7db2c; --bg: #050505; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 40px; display: flex; justify-content: center; }

        .admin-container { display: grid; grid-template-columns: 450px 500px; gap: 40px; max-width: 1100px; width: 100%; }
        .panel { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 30px; backdrop-filter: blur(10px); }
        
        h2 { font-family: 'Space Grotesk'; color: var(--accent); margin-top: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; }

        /* Input Styles */
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px; font-weight: 800; letter-spacing: 1px; }
        input, select, textarea { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; outline: none; font-size: 14px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(183,219,44,0.1); }

        /* Season 2 Buttons */
        .btn-deploy { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; font-size: 16px; margin-top: 10px; text-transform: uppercase; }
        .btn-deploy:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(183,219,44,0.3); }
        .btn-stop { width: 100%; background: transparent; border: 1px solid #ff4757; color: #ff4757; padding: 12px; border-radius: 14px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn-stop:hover { background: #ff4757; color: #fff; }

        /* Preview Box */
        .preview-zone { background: #000; border-radius: 20px; display: flex; align-items: center; justify-content: center; min-height: 300px; border: 1px solid #111; position: relative; }
        .s2-bar-mock { width: 90%; background: rgba(183, 219, 44, 0.05); border: 1px solid rgba(183, 219, 44, 0.2); border-left: 5px solid var(--accent); border-radius: 15px; padding: 20px; }
        .tag-mock { background: var(--accent); color: #000; padding: 3px 8px; border-radius: 4px; font-weight: 900; font-size: 10px; text-transform: uppercase; }

        /* Animations */
        .anim-glow { animation: glow 1.5s infinite alternate; color: var(--accent) !important; }
        @keyframes glow { from { text-shadow: 0 0 5px var(--accent); } to { text-shadow: 0 0 20px var(--accent); } }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="panel">
        <h2>S2 Broadcast Control</h2>
        
        <div class="field">
            <label>Announcement Tag</label>
            <input type="text" id="tag" placeholder="SEASON 2" oninput="updatePreview()">
        </div>

        <div class="field">
            <label>Headline / Title</label>
            <input type="text" id="title" placeholder="Major Update v2.0" oninput="updatePreview()">
        </div>

        <div class="field">
            <label>Message Content</label>
            <textarea id="msg" rows="3" placeholder="Explain the update..." oninput="updatePreview()"></textarea>
        </div>

        <div class="field">
            <label>Visual FX (Animation)</label>
            <select id="anim" onchange="updatePreview()">
                <option value="none">Normal (Static)</option>
                <option value="anim-glow">Cyber Glow</option>
                <option value="shake">Warning Shake</option>
                <option value="pulse">Soft Pulse</option>
            </select>
        </div>

        <button class="btn-deploy" onclick="publish()">🚀 Deploy Season 2</button>
        <button class="btn-stop" onclick="terminate()">Terminate Broadcast</button>
    </div>

    <div class="panel">
        <h2>Live Preview</h2>
        <div class="preview-zone">
            <div class="s2-bar-mock">
                <span id="p-tag" class="tag-mock">SEASON 2</span>
                <h3 id="p-title" style="margin: 12px 0 5px; font-family: 'Space Grotesk';">Headline Preview</h3>
                <p id="p-msg" style="color: #888; font-size: 13px; margin: 0;">Your message will appear here...</p>
            </div>
        </div>
        <p style="text-align: center; color: #444; font-size: 11px; margin-top: 20px;">SYSTEM STATUS: <span id="sys-status" style="color: #ff4757;">OFFLINE</span></p>
    </div>
</div>

<script>
    // Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE",
        authDomain: "lemoncorehub.firebaseapp.com",
        databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com",
        projectId: "lemoncorehub",
        appId: "1:525738244860:web:80f017ad81ddb675d83579"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function updatePreview() {
        document.getElementById('p-tag').innerText = document.getElementById('tag').value || "S2 UPDATE";
        document.getElementById('p-title').innerText = document.getElementById('title').value || "Headline Preview";
        document.getElementById('p-msg').innerText = document.getElementById('msg').value || "Message preview...";
        document.getElementById('p-title').className = document.getElementById('anim').value;
    }

    function publish() {
        const data = {
            tag: document.getElementById('tag').value || "SEASON 2",
            title: document.getElementById('title').value || "Broadcast",
            message: document.getElementById('msg').value || "",
            anim: document.getElementById('anim').value,
            active: true,
            timestamp: Date.now()
        };

        db.ref('announcement').set(data).then(() => {
            alert("Season 2 Update Deployed!");
        });
    }

    function terminate() {
        db.ref('announcement').update({ active: false }).then(() => {
            alert("Broadcast Terminated.");
        });
    }

    // Sync Status
    db.ref('announcement/active').on('value', snap => {
        const status = document.getElementById('sys-status');
        if(snap.val() === true) {
            status.innerText = "LIVE ON HUB";
            status.style.color = "#b7db2c";
        } else {
            status.innerText = "OFFLINE";
            status.style.color = "#ff4757";
        }
    });
</script>

</body>
</html>
