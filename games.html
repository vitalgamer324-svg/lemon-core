<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Zone | Lemon Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --accent: #b7db2c; --card: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: 'Poppins'; margin: 0; }
        nav { padding: 20px 8%; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 50px 8%; }
        .game-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #111; transition: 0.3s; }
        .game-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .thumb { height: 180px; background: linear-gradient(45deg, #111, #000); display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: 'Space Grotesk'; }
        .content { padding: 20px; }
        .btn-get { display: block; width: 100%; padding: 10px; background: var(--accent); color: #000; text-align: center; text-decoration: none; font-weight: bold; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="color:var(--accent); text-decoration:none; font-weight:bold;">LEMON CORE</a>
        <a href="index.html" style="color:#555; text-decoration:none;">Back</a>
    </nav>
    <div style="text-align:center; padding-top:50px;">
        <h1 style="font-family:'Space Grotesk'; font-size:45px;">ROBLOX <span style="color:var(--accent)">SCRIPTS</span></h1>
        <p style="color:#666;">High-performance scripts for top games.</p>
    </div>
    <div class="grid">
        <div class="game-card">
            <div class="thumb">BLOX FRUITS</div>
            <div class="content">
                <h3>Lemon Hub v4</h3>
                <p style="color:#555; font-size:12px;">Auto Farm, Fruit Sniper, Fast Attack.</p>
                <a href="#" class="btn-get">Get Script</a>
            </div>
        </div>
        <div class="game-card">
            <div class="thumb">PET SIM 99</div>
            <div class="content">
                <h3>Auto-Clicker Pro</h3>
                <p style="color:#555; font-size:12px;">Multi-instance support, Undetected.</p>
                <a href="#" class="btn-get">Get Script</a>
            </div>
        </div>
    </div>
</body>
</html>
