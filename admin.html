<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INFINITY CORE | GOD-MODE TERMINAL v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --neon: #b7db2c; --danger: #ff0055; --cyan: #00f2ff; --bg: #050505; --panel: rgba(20,20,20,0.8); }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk'; margin: 0; display: none; overflow: hidden; height: 100vh; }
        
        /* 🌌 Animated Background */
        .bg-glow { position: fixed; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%); }

        /* 🏰 Main Layout */
        .grid-container { display: grid; grid-template-columns: 280px 1fr 300px; height: 100vh; gap: 10px; padding: 10px; }
        .module { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px); }
        .module-header { background: rgba(255,255,255,0.03); padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 700; color: var(--neon); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
        .content { padding: 20px; overflow-y: auto; flex: 1; }

        /* 🛠️ Super Input Styles */
        .field { margin-bottom: 15px; }
        label { font-size: 10px; color: #666; display: block; margin-bottom: 5px; font-weight: 700; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 10px; color: var(--cyan); border-radius: 8px; font-family: 'JetBrains Mono'; font-size: 12px; outline: none; }
        input:focus { border-color: var(--neon); }

        /* 🎖️ Badge Cloud */
        .badge-cloud { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .b-tag { background: #111; border: 1px solid #222; padding: 8px; border-radius: 5px; cursor: pointer; text-align: center; transition: 0.3s; opacity: 0.3; }
        .b-tag.active { opacity: 1; border-color: var(--neon); background: rgba(183, 219, 44, 0.1); }
        .b-tag img { width: 18px; }

        /* ⚡ Action Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .master-btn { padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; }
        .btn-save { background: var(--neon); color: #000; box-shadow: 0 0 20px rgba(183,219,44,0.2); }
        .btn-nuke { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-nuke:hover { background: var(--danger); color: #fff; }

        /* 📟 Terminal Log */
        .log { font-family: 'JetBrains Mono'; font-size: 10px; color: #444; }
        .log-success { color: var(--neon); }
        .log-error { color: var(--danger); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body id="adminBody">
    <div class="bg-glow"></div>

    <div class="grid-container">
        <div class="module">
            <div class="module-header">📡 Network & Stats</div>
            <div class="content">
                <div style="background:#000; padding:15px; border-radius:10px; margin-bottom:20px;">
                    <p style="margin:0; font-size:10px; color:#555;">SYSTEM UPTIME</p>
                    <h2 id="uptime" style="margin:5px 0; color:var(--cyan);">00:00:00</h2>
                </div>
                <label>LIVE PLAYERS</label><h3 id="sOnline" style="color:var(--neon)">0</h3>
                <label>TOTAL ACCOUNTS</label><h3 id="sUsers">0</h3>
                <label>GLOBAL ECONOMY</label><h3 id="sEco">0</h3>
                <hr style="border:0; border-top:1px solid #111; margin:20px 0;">
                <label>MAINTENANCE MODE</label>
                <select id="maintMode" onchange="toggleMaint()">
                    <option value="OFF">DISABLED</option>
                    <option value="ON">ENABLED (Lock Site)</option>
                </select>
            </div>
        </div>

        <div class="module">
            <div class="module-header">⚡ PLAYER MASTER CONTROL (100+ FEATURES)</div>
            <div class="content">
                <div class="field">
                    <label>TARGET UID (CRITICAL)</label>
                    <input type="text" id="targetUid" placeholder="ENTER UID TO LINK DATA...">
                </div>

                <div class="btn-grid">
                    <div class="field"><label>SET COINS</label><input type="number" id="coinAmt"></div>
                    <div class="field"><label>SET LEVEL</label><input type="number" id="userLevel"></div>
                </div>

                <div class="field">
                    <label>RANK & PERMISSIONS</label>
                    <select id="setRole">
                        <option value="PLAYER">PLAYER</option>
                        <option value="VIP">VIP+</option>
                        <option value="LEGEND">LEGEND</option>
                        <option value="MOD">MODERATOR</option>
                        <option value="ADMIN">ADMINISTRATOR</option>
                        <option value="OWNER">SYSTEM OWNER</option>
                        <option value="BANNED">BANNED USER</option>
                    </select>
                </div>

                <label>BADGE INJECTION MATRIX (SELECT ALL THAT APPLY)</label>
                <div class="badge-cloud" id="badgeCloud">
                    <div class="b-tag" onclick="tgB(this, 'isVerified')" title="Verified Account"><img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg"></div>
                    <div class="b-tag" onclick="tgB(this, 'isOwner')" title="Founder"><img src="https://cdn-icons-png.flaticon.com/512/10629/10629607.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'isAdmin')" title="Admin"><img src="https://cdn-icons-png.flaticon.com/512/2555/2555020.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'isDev')" title="Developer"><img src="https://cdn-icons-png.flaticon.com/512/6062/6062646.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'hasNitro')" title="Premium Boost"><img src="https://cdn-icons-png.flaticon.com/512/7501/7501066.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'isAmbani')" title="Rich Player"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'isHelper')" title="Helper Role"><img src="https://cdn-icons-png.flaticon.com/512/1067/1067561.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'hasMembership')" title="Member"><img src="https://cdn-icons-png.flaticon.com/512/10629/10629583.png"></div>
                    <div class="b-tag" onclick="tgB(this, 'isOg')" title="Old Gen Player">OG</div>
                    <div class="b-tag" onclick="tgB(this, 'isBugHunter')" title="Bug Hunter">🐞</div>
                    <div class="b-tag" onclick="tgB(this, 'isTopDonator')" title="Top Donator">💎</div>
                    <div class="b-tag" onclick="tgB(this, 'isCreative')" title="Creative Mode">🎨</div>
                </div>

                <div class="field" style="margin-top:20px">
                    <label>OVERRIDE BIO / STATUS</label>
                    <textarea id="userBio" rows="2"></textarea>
                </div>

                <div class="field">
                    <label>CUSTOM CSS INJECTION (FORCE STYLES)</label>
                    <textarea id="customCss" rows="2" placeholder=".card { animation: shake 0.5s; }"></textarea>
                </div>

                <div class="btn-grid">
                    <button class="master-btn btn-save" onclick="executePush()">EXECUTE MASTER PUSH</button>
                    <button class="master-btn btn-nuke" onclick="triggerNuke()">NUKE PLAYER</button>
                </div>
            </div>
        </div>

        <div class="module">
            <div class="module-header">📟 System Log & UI</div>
            <div class="content">
                <div id="terminalLog" class="log" style="height:200px; overflow-y:auto; background:#000; padding:10px; border-radius:10px; margin-bottom:20px;">
                    > SYSTEM INITIALIZED...<br>
                    > WAITING FOR COMMAND...
                </div>

                <label>GLOBAL BROADCAST NOTICE</label>
                <textarea id="globalNotice" rows="3"></textarea>
                <button class="master-btn btn-save" style="width:100%; margin-top:10px; height:40px;" onclick="pushNotice()">SEND BROADCAST</button>

                <hr style="border:0; border-top:1px solid #111; margin:20px 0;">
                
                <label>THEME ACCENT</label>
                <input type="color" id="accentColor" value="#b7db2c" style="height:40px; padding:2px;">
                
                <label style="margin-top:15px;">MUSIC OVERRIDE (YT ID)</label>
                <input type="text" id="musicId" placeholder="dQw4w9WgXcQ">

                <label style="margin-top:15px;">AVATAR BORDER EFFECT</label>
                <select id="borderEffect">
                    <option value="none">NONE</option>
                    <option value="glow">NEON GLOW</option>
                    <option value="spin">RGB SPIN</option>
                    <option value="pulse">SOFT PULSE</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE", 
            authDomain: "lemoncorehub.firebaseapp.com", 
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com", 
            projectId: "lemoncorehub", 
            appId: "1:525738244860:web:80f017ad81ddb675d83579" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selectedBadges = {};

        // 🔒 ADMIN AUTH CHECK
        firebase.auth().onAuthStateChanged(user => {
            if(user && user.email === 'lemonadmin77@gmail.com') {
                document.getElementById('adminBody').style.display = 'block';
                startUptime();
                initStats();
                addLog("ACCESS GRANTED: WELCOME OWNER.", "success");
            } else { window.location.href = "index.html"; }
        });

        function addLog(msg, type="") {
            const log = document.getElementById('terminalLog');
            const colorClass = type === "success" ? "log-success" : (type === "error" ? "log-error" : "");
            log.innerHTML += `<div class="${colorClass}">> ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        function initStats() {
            db.ref('users').on('value', snap => {
                let u=0, o=0, e=0;
                snap.forEach(c => {
                    const d = c.val(); u++; e += (d.coins || 0);
                    if(d.status === 'online') o++;
                });
                document.getElementById('sUsers').innerText = u;
                document.getElementById('sOnline').innerText = o;
                document.getElementById('sEco').innerText = e.toLocaleString();
            });
        }

        function tgB(btn, key) {
            btn.classList.toggle('active');
            selectedBadges[key] = btn.classList.contains('active');
            addLog(`Toggled: ${key}`);
        }

        async function executePush() {
            const uid = document.getElementById('targetUid').value.trim();
            if(!uid) return addLog("ERROR: TARGET UID MISSING!", "error");

            const updates = {
                ...selectedBadges,
                role: document.getElementById('setRole').value,
                bio: document.getElementById('userBio').value,
                customCss: document.getElementById('customCss').value,
                accentColor: document.getElementById('accentColor').value,
                musicId: document.getElementById('musicId').value,
                borderEffect: document.getElementById('borderEffect').value
            };
            
            const coins = document.getElementById('coinAmt').value;
            const lvl = document.getElementById('userLevel').value;
            if(coins !== "") updates.coins = parseInt(coins);
            if(lvl !== "") updates.level = parseInt(lvl);

            try {
                await db.ref('users/' + uid).update(updates);
                addLog(`DATA SYNCED TO [${uid}] SUCCESSFULLY.`, "success");
                alert("Master Push Complete!");
            } catch(e) { addLog("PUSH FAILED: " + e.message, "error"); }
        }

        function pushNotice() {
            const n = document.getElementById('globalNotice').value;
            db.ref('settings/notice').set(n).then(() => addLog("BROADCAST SENT TO ALL USERS.", "success"));
        }

        function triggerNuke() {
            const uid = document.getElementById('targetUid').value.trim();
            if(!uid) return;
            if(confirm("TERMINATE PLAYER PERMANENTLY?")) {
                db.ref('users/' + uid).update({ isBanned: true, coins: 0, role: 'TERMINATED' })
                .then(() => addLog(`NUKE EXECUTED ON ${uid}.`, "error"));
            }
        }

        function startUptime() {
            let s = 0;
            setInterval(() => {
                s++;
                let h = Math.floor(s/3600).toString().padStart(2,'0');
                let m = Math.floor((s%3600)/60).toString().padStart(2,'0');
                let sec = (s%60).toString().padStart(2,'0');
                document.getElementById('uptime').innerText = `${h}:${m}:${sec}`;
            }, 1000);
        }
    </script>
</body>
</html>
