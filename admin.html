<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Core | Online Tracking Active</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #b7db2c; --danger: #ff4757; --bg: #050505; --card: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Outfit'; margin: 0; display: none; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #080808; border-right: 1px solid #151515; padding: 40px 25px; display: flex; flex-direction: column; }
        .viewport { flex: 1; padding: 40px 60px; overflow-y: auto; background: radial-gradient(circle at top right, #0a0a0a, #050505); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #151515; text-align: center; }
        .stat-card span { font-size: 11px; color: #555; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0; font-family: 'Space Grotesk'; font-size: 32px; color: var(--accent); }
        .panel { background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid #151515; margin-bottom: 30px; }
        .btn-prime { width: 100%; background: var(--accent); color: black; font-weight: 800; border: none; padding: 18px; border-radius: 14px; cursor: pointer; text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #222; padding: 16px; border-radius: 14px; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .cmd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .cmd-btn { background: #111; border: 1px solid #222; color: #777; padding: 14px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; }
        .online-dot { height: 10px; width: 10px; background-color: #23a55a; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #23a55a; }
    </style>
</head>
<body id="adminBody">

    <div class="sidebar">
        <h1 style="color:var(--accent); font-family:'Space Grotesk'">LEMON<span>CORE</span></h1>
        <div style="color:#444; font-size:12px; margin-bottom:20px;">SYSTEM OPERATOR</div>
        <button class="btn-prime" onclick="location.href='index.html'" style="background:#222; color:white;">Exit Terminal</button>
    </div>

    <div class="viewport">
        <div class="stats-grid">
            <div class="stat-card">
                <span><span class="online-dot"></span>Live Players</span>
                <h2 id="sOnline" style="color:#23a55a;">0</h2>
            </div>
            <div class="stat-card"><span>Total Accounts</span><h2 id="sUsers">0</h2></div>
            <div class="stat-card"><span>Global Economy</span><h2 id="sEco">0</h2></div>
            <div class="stat-card"><span>System Load</span><h2 style="color:cyan">0.01s</h2></div>
        </div>

        <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px;">
            <div class="panel">
                <h3>👤 ACCOUNT INJECTOR</h3>
                <input type="text" id="targetUid" placeholder="Target User UID...">
                <div style="display:flex; gap:10px;">
                    <input type="number" id="coinAmt" placeholder="Coins to Set">
                    <select id="setRole">
                        <option value="PLAYER">PLAYER</option>
                        <option value="VIP">VIP</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <button class="btn-prime" onclick="updateAccount()">Update Player Data</button>
            </div>

            <div class="panel">
                <h3>📢 ANNOUNCEMENT</h3>
                <textarea id="noticeMsg" placeholder="News scrolling bar text..."></textarea>
                <button class="btn-prime" style="background:white" onclick="pushNotice()">Publish</button>
            </div>
        </div>

        <div class="panel">
            <h3>⚡ COMMAND CENTER</h3>
            <div class="cmd-grid" id="cmdArmy">
                <button class="cmd-btn" onclick="quickCoins(50000)">+50k Coins</button>
                <button class="cmd-btn" onclick="quickCoins(1000000)">+1M Coins</button>
                <button class="cmd-btn" onclick="quickRank('VIP')">Set VIP</button>
                <button class="cmd-btn" style="color:red" onclick="banUser()">BAN USER</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE", authDomain: "lemoncorehub.firebaseapp.com", databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com", projectId: "lemoncorehub", appId: "1:525738244860:web:80f017ad81ddb675d83579" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if(user && user.email === 'lemonadmin77@gmail.com') {
                document.getElementById('adminBody').style.display = 'flex';
                syncRealtimeData();
            } else {
                window.location.href = "index.html";
            }
        });

        function syncRealtimeData() {
            db.ref('users').on('value', snap => {
                let online = 0, totalU = 0, totalC = 0;
                snap.forEach(u => {
                    const data = u.val();
                    totalU++;
                    totalC += (data.coins || 0);
                    if(data.status === 'online') online++; // ONLINE CHECK
                });
                document.getElementById('sOnline').innerText = online;
                document.getElementById('sUsers').innerText = totalU;
                document.getElementById('sEco').innerText = totalC.toLocaleString();
            });
        }

        // --- Standard Admin Functions ---
        function updateAccount() {
            const uid = document.getElementById('targetUid').value.trim();
            db.ref('users/' + uid).update({
                coins: parseInt(document.getElementById('coinAmt').value) || 0,
                role: document.getElementById('setRole').value
            }).then(() => alert("Updated!"));
        }

        function quickCoins(amt) {
            const uid = document.getElementById('targetUid').value.trim();
            if(!uid) return alert("UID Paste Koro!");
            db.ref('users/' + uid + '/coins').transaction(c => (c || 0) + amt);
        }

        function pushNotice() {
            const msg = document.getElementById('noticeMsg').value;
            db.ref('settings/notice').set(msg).then(() => alert("Published!"));
        }

        function quickRank(r) {
            const uid = document.getElementById('targetUid').value.trim();
            db.ref('users/' + uid).update({ role: r });
        }
        
        function banUser() {
            const uid = document.getElementById('targetUid').value.trim();
            if(confirm("Ban Permanently?")) db.ref('users/' + uid).update({ isBanned: true });
        }
    </script>
</body>
</html>
