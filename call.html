<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Support | Live Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #b7db2c;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(183, 219, 44, 0.2);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(183, 219, 44, 0.1), transparent 70%);
            z-index: -1;
        }

        .call-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--accent);
            object-fit: cover;
        }

        h1 { font-family: 'Space Grotesk'; font-size: 24px; margin-bottom: 5px; letter-spacing: 1px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }

        .call-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .call-card {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .call-card:hover {
            background: var(--accent);
            color: #000;
            transform: scale(1.05);
        }

        .icon { font-size: 24px; margin-right: 15px; }
        .details b { display: block; font-size: 16px; text-align: left; }
        .details span { font-size: 11px; opacity: 0.7; display: block; text-align: left; }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px #2ecc71;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            color: #555;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="call-container">
        <img src="https://i.ibb.co/vzPZf5q/admin-avatar.png" class="profile-img" alt="Admin">
        
        <h1>Connect with Admin</h1>
        <p><span class="status-dot"></span> Available for Support</p>

        <div class="call-options">
            <a href="tel:+8801234567890" class="call-card">
                <span class="icon">📞</span>
                <div class="details">
                    <b>Direct Voice Call</b>
                    <span>Instant mobile connection</span>
                </div>
            </a>

            <a href="https://wa.me/8801234567890" target="_blank" class="call-card">
                <span class="icon">💬</span>
                <div class="details">
                    <b>WhatsApp Chat</b>
                    <span>Send screenshots or files</span>
                </div>
            </a>

            <a href="https://discord.com" target="_blank" class="call-card">
                <span class="icon">🎮</span>
                <div class="details">
                    <b>Discord Support</b>
                    <span>Join Voice Channel for help</span>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-btn">← Back to Hub</a>
    </div>

</body>
</html>
