<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI-PREMIUM | Elite Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=Outfit:wght@300;600;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

    <style>
        :root { 
            --p-main: #b7db2c; --p-bg: #020202; --p-card: rgba(15, 15, 15, 0.8);
            --p-border: rgba(255, 255, 255, 0.08); --p-nitro: #ff73fa;
        }

        body { 
            background: var(--p-bg); color: #fff; font-family: 'Outfit'; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #020202 100%);
            overflow-x: hidden;
        }

        /* 🌌 Premium Mesh Animation Background */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: linear-gradient(45deg, #050505, #111, #050505);
            opacity: 0.5;
        }

        /* 🏰 The Master Profile Card */
        .premium-card {
            width: 750px; background: var(--p-card); border-radius: 24px;
            border: 1px solid var(--p-border); backdrop-filter: blur(25px);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8); overflow: hidden; position: relative;
        }

        /* 🖼️ Animated Banner Area */
        .banner-wrapper {
            height: 220px; background: #111 center/cover; position: relative;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .banner-overlay {
            position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        /* 👤 Avatar Logic */
        .avatar-holder {
            position: absolute; top: 140px; left: 35px; width: 140px; height: 140px;
            border-radius: 35px; background: var(--p-bg); padding: 6px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .avatar-img { 
            width: 100%; height: 100%; border-radius: 28px; object-fit: cover; 
            background: #1a1a1a; transition: 0.4s;
        }
        .nitro-ring { border: 3px solid var(--p-nitro); box-shadow: 0 0 20px var(--p-nitro); }

        /* 📝 Info & Layout */
        .card-content { padding: 80px 35px 35px; }
        .top-info { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .name-tag h1 { font-family: 'Space Grotesk'; font-size: 36px; margin: 0; letter-spacing: -1px; }
        .name-tag p { color: #666; margin: 5px 0; font-family: 'JetBrains Mono'; font-size: 13px; }

        /* 🎖️ Advanced Badge Strip */
        .badge-strip { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--p-border); }
        .b-icon { width: 24px; height: 24px; }

        /* 📊 Premium Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 35px; }
        .s-card { 
            background: rgba(255,255,255,0.02); padding: 18px; border-radius: 18px; 
            border: 1px solid var(--p-border); text-align: center; transition: 0.3s;
        }
        .s-card:hover { background: rgba(183,219,44,0.05); border-color: var(--p-main); transform: translateY(-5px); }
        .s-card span { display: block; font-size: 10px; color: #555; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
        .s-card b { font-size: 20px; color: var(--p-main); font-family: 'Space Grotesk'; }

        /* 🔘 Action Buttons */
        .btn-row { display: flex; gap: 10px; margin-top: 30px; }
        .btn { 
            flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; 
            cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }
        .btn-prime { background: var(--p-main); color: #000; box-shadow: 0 10px 25px rgba(183,219,44,0.2); }
        .btn-prime:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn-sec { background: #1a1a1a; color: #fff; border: 1px solid var(--p-border); }

        /* 🛠️ Edit Modal (The Pro Interface) */
        #editModal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); 
            display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
        }
        .modal-body { 
            background: #0f0f0f; width: 500px; padding: 40px; border-radius: 30px; 
            border: 1px solid var(--p-main); box-shadow: 0 0 50px rgba(183,219,44,0.1);
        }
        .modal-body h2 { font-family: 'Space Grotesk'; color: var(--p-main); margin-bottom: 25px; }
        
        input, textarea { 
            width: 100%; background: #050505; border: 1px solid #222; padding: 15px; 
            border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--p-main); }

        /* Custom File Upload Styling */
        .file-label { 
            display: block; padding: 15px; background: #151515; border: 1px dashed #333; 
            border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 15px; font-size: 12px; color: #888;
        }
        .file-label:hover { border-color: var(--p-main); color: #fff; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--p-main); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="mesh-bg"></div>

    <div id="editModal">
        <div class="modal-body">
            <h2>CUSTOMIZE PROFILE</h2>
            
            <label class="file-label" for="avatarInp">Click to Change Avatar (Logo)</label>
            <input type="file" id="avatarInp" onchange="previewImg(this, 'pAvatar')">

            <label class="file-label" for="bannerInp">Click to Change Banner</label>
            <input type="file" id="bannerInp" onchange="previewImg(this, 'pBanner')">

            <input type="text" id="editName" placeholder="Global Display Name">
            <textarea id="editBio" rows="3" placeholder="Write your premium bio..."></textarea>

            <button class="btn btn-prime" style="width:100%" onclick="savePremiumProfile()">EXECUTE SYNC</button>
            <button class="btn btn-sec" style="width:100%; margin-top:10px;" onclick="toggleModal(false)">CLOSE TERMINAL</button>
        </div>
    </div>

    <div class="premium-card">
        <div class="banner-wrapper" id="pBanner">
            <div class="banner-overlay"></div>
        </div>

        <div class="avatar-holder">
            <img src="" id="pAvatar" class="avatar-img">
        </div>

        <div class="card-content">
            <div class="top-info">
                <div class="name-tag">
                    <h1 id="pName">Loading...</h1>
                    <p id="pUid">ID: L0AD1NG_SYNC</p>
                </div>
                <div class="badge-strip" id="badgeBox">
                    </div>
            </div>

            <p id="pBio" style="color:#aaa; font-size:15px; line-height:1.6; margin-top:20px; max-width:85%;">
                Synchronizing with Lemon Core Database...
            </p>

            <div class="stats-grid">
                <div class="s-card"><span>Credits</span><b id="pCoins">0</b></div>
                <div class="s-card"><span>Exp Level</span><b id="pLevel">1</b></div>
                <div class="s-card"><span>Global Rank</span><b id="pRole">PLAYER</b></div>
                <div class="s-card"><span>Social</span><b id="pFriends">0</b></div>
            </div>

            <div class="btn-row">
                <button class="btn btn-prime" onclick="toggleModal(true)">⚙️ Edit Customization</button>
                <button class="btn btn-sec">Send Friend Request</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE", 
            authDomain: "lemoncorehub.firebaseapp.com", 
            databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com", 
            projectId: "lemoncorehub", 
            appId: "1:525738244860:web:80f017ad81ddb675d83579",
            storageBucket: "lemoncorehub.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let uid;

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                uid = user.uid;
                document.getElementById('pUid').innerText = `ID: ${uid.toUpperCase().substring(0,12)}`;
                syncData();
            } else { window.location.href = "login.html"; }
        });

        function syncData() {
            db.ref('users/' + uid).on('value', snap => {
                const d = snap.val() || {};
                
                // Text Updates
                document.getElementById('pName').innerText = d.displayName || "New User";
                document.getElementById('pBio').innerText = d.bio || "No status bio updated yet.";
                document.getElementById('pCoins').innerText = (d.coins || 0).toLocaleString();
                document.getElementById('pLevel').innerText = d.level || "1";
                document.getElementById('pRole').innerText = d.role || "PLAYER";
                document.getElementById('pFriends').innerText = d.friendCount || "0";

                // Media Updates
                if(d.avatar) document.getElementById('pAvatar').src = d.avatar;
                else document.getElementById('pAvatar').src = "https://i.imgur.com/6VBx3io.png";
                
                if(d.banner) document.getElementById('pBanner').style.backgroundImage = `url('${d.banner}')`;

                // Nitro Styling
                if(d.hasNitro) document.getElementById('pAvatar').classList.add('nitro-ring');

                // Badge Logic
                const bb = document.getElementById('badgeBox');
                bb.innerHTML = '';
                if(d.isVerified) bb.innerHTML += `<img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg" class="b-icon">`;
                if(d.isOwner) bb.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/10629/10629607.png" class="b-icon">`;
                if(d.isDev) bb.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/6062/6062646.png" class="b-icon">`;
                if(d.hasNitro) bb.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/7501/7501066.png" class="b-icon">`;
            });
        }

        function toggleModal(s) { document.getElementById('editModal').style.display = s ? 'flex' : 'none'; }

        // 📷 Real-time Image Preview & Upload Logic
        async function savePremiumProfile() {
            const name = document.getElementById('editName').value;
            const bio = document.getElementById('editBio').value;
            const avInp = document.getElementById('avatarInp').files[0];
            const bnInp = document.getElementById('bannerInp').files[0];

            let updates = {};
            if(name) updates.displayName = name;
            if(bio) updates.bio = bio;

            alert("Master Sync Started... Please wait.");

            if(avInp) {
                const ref = storage.ref(`users/${uid}/avatar`);
                await ref.put(avInp);
                updates.avatar = await ref.getDownloadURL();
            }
            if(bnInp) {
                const ref = storage.ref(`users/${uid}/banner`);
                await ref.put(bnInp);
                updates.banner = await ref.getDownloadURL();
            }

            await db.ref('users/' + uid).update(updates);
            toggleModal(false);
            alert("Profile Synced with Cloud Core!");
        }

        function previewImg(input, targetId) {
            if (input.files && input.files[0]) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    if(targetId === 'pBanner') document.getElementById(targetId).style.backgroundImage = `url(${e.target.result})`;
                    else document.getElementById(targetId).src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
