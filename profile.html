<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Premium Profile | Lemon Core Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --accent: #b7db2c; 
            --nitro: #ff73fa;
            --verify: #00a2ed;
            --bg: #050505; 
            --card: #0b0b0b; 
        }
        
        body { 
            background: var(--bg); color: white; font-family: 'Outfit'; 
            margin: 0; display: flex; justify-content: center; padding: 80px 20px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
        }

        /* Profile Card */
        .profile-card { 
            width: 800px; background: var(--card); border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.03); overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8); position: relative;
        }

        /* Banner */
        .banner { 
            height: 240px; background: #111; background-size: cover; 
            background-position: center; position: relative;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Avatar System */
        .avatar-container {
            position: absolute; top: 160px; left: 40px;
            width: 150px; height: 150px; background: var(--card);
            border-radius: 50%; padding: 8px;
        }
        .avatar-main {
            width: 100%; height: 100%; border-radius: 50%;
            background: #1a1a1b; display: flex; align-items: center;
            justify-content: center; font-size: 60px; font-weight: 900;
            color: var(--accent); border: 2px solid rgba(255,255,255,0.1);
        }

        /* Badge Logic (Boro Boro Icons) */
        .badge-container {
            position: absolute; top: 260px; right: 40px;
            display: flex; gap: 12px; align-items: center;
        }
        .badge-item {
            width: 32px; height: 32px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .badge-item:hover { transform: scale(1.3); }

        /* Text Styling */
        .profile-content { padding: 90px 45px 50px; }
        .user-header { display: flex; align-items: center; gap: 10px; }
        .user-name { 
            font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; margin: 0; 
            letter-spacing: -1px;
        }
        .verified-icon { width: 34px; height: 34px; }
        
        .user-tag { color: #888; font-size: 16px; margin-top: 5px; }

        /* Stats Grid */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; margin-top: 40px; 
        }
        .stat-card {
            background: rgba(255,255,255,0.02); padding: 25px; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.05);
            text-align: center; transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.04); transform: translateY(-5px); }
        .stat-num { 
            display: block; font-size: 28px; font-weight: 900; 
            font-family: 'Space Grotesk'; color: var(--accent);
        }
        .stat-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* Glow Effects */
        .glow-lime { border: 2px solid var(--accent) !important; box-shadow: 0 0 50px rgba(183, 219, 44, 0.2); }
        .glow-nitro { border: 2px solid var(--nitro) !important; box-shadow: 0 0 50px rgba(255, 115, 250, 0.2); }
    </style>
</head>
<body>

    <div class="profile-card" id="mainCard">
        <div class="banner" id="userBanner">
            <div class="avatar-container">
                <div class="avatar-main" id="userAvatar">L</div>
            </div>
            
            <div class="badge-container" id="badgeBox">
                </div>
        </div>

        <div class="profile-content">
            <div class="user-header">
                <h1 class="user-name" id="userName">Lemon Player</h1>
                <div id="verifySpace"></div> </div>
            <div class="user-tag" id="userRole">@premium_member</div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-num" id="statCoins">0</span>
                    <span class="stat-label">Total Coins</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num" id="statRank">ROOKIE</span>
                    <span class="stat-label">Global Rank</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num">S2</span>
                    <span class="stat-label">Active Era</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB5sjXvfgR63GKMbLt8kkC2Ys-2B78rjGE", authDomain: "lemoncorehub.firebaseapp.com", databaseURL: "https://lemoncorehub-default-rtdb.firebaseio.com", projectId: "lemoncorehub", appId: "1:525738244860:web:80f017ad81ddb675d83579" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                db.ref('users/' + user.uid).on('value', snap => {
                    const data = snap.val() || {};
                    
                    // Basic Info
                    document.getElementById('userName').innerText = data.displayName || "Lemon Hero";
                    document.getElementById('statCoins').innerText = (data.coins || 0).toLocaleString();
                    document.getElementById('statRank').innerText = data.role || "PLAYER";
                    document.getElementById('userRole').innerText = "@" + (data.role || "player").toLowerCase();

                    // 💎 Premium Theme Check
                    const card = document.getElementById('mainCard');
                    if(data.theme === 'cyber-lime') card.classList.add('glow-lime');
                    if(data.theme === 'nitro-boost') card.classList.add('glow-nitro');

                    // ✅ BIG VERIFIED BADGE (Boro manusder moto)
                    const verifySpace = document.getElementById('verifySpace');
                    verifySpace.innerHTML = '';
                    if(data.isVerified) {
                        verifySpace.innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Twitter_Verified_Badge.svg" class="verified-icon" title="Official Verified Account">`;
                    }

                    // 🎖️ OTHER BADGES (Emoji & Premium Icons)
                    const bBox = document.getElementById('badgeBox');
                    bBox.innerHTML = '';
                    
                    if(data.role === 'ADMIN') {
                        bBox.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/10629/10629607.png" class="badge-item" title="Server Owner">`;
                    }
                    if(data.hasNitro) {
                        bBox.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/7501/7501066.png" class="badge-item" title="Nitro Subscriber">`;
                    }
                    if(data.coins > 100000) {
                        bBox.innerHTML += `<img src="https://cdn-icons-png.flaticon.com/512/9183/9183664.png" class="badge-item" title="Millionaire Club">`;
                    }

                    // Banner & Avatar
                    if(data.banner) document.getElementById('userBanner').style.backgroundImage = `url('${data.banner}')`;
                    if(data.avatar) document.getElementById('userAvatar').innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
                });
            }
        });
    </script>
</body>
</html>
